<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SKT Ассистент</title>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #060810;
    --surface: #0d1117;
    --surface2: #13192a;
    --surface3: #1a2235;
    --border: rgba(255,255,255,0.07);
    --accent: #4f8eff;
    --accent2: #a78bfa;
    --glow: rgba(79,142,255,0.15);
    --text: #f0f4ff;
    --text2: #8892b0;
    --text3: #4a5568;
    --user-bg: linear-gradient(135deg, #1e3a5f, #1a2a4a);
    --bot-bg: #0d1117;
    --success: #10d9a0;
    --radius: 18px;
  }

  html, body {
    height: 100%;
    font-family: 'Onest', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -10%;
    width: 60%;
    height: 60%;
    background: radial-gradient(ellipse, rgba(79,142,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -10%;
    width: 50%;
    height: 50%;
    background: radial-gradient(ellipse, rgba(167,139,250,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 860px;
    margin: 0 auto;
  }

  /* ── HEADER ── */
  header {
    flex-shrink: 0;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(13,17,23,0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .logo-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .logo {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, #1e3a6e, #2d5ca8);
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 20px rgba(79,142,255,0.3);
  }
  .logo-ring {
    position: absolute;
    inset: -3px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    z-index: -1;
    opacity: 0.4;
  }

  .header-text h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .header-text p {
    font-size: 12px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 1px;
  }
  .pulse {
    width: 7px; height: 7px;
    background: var(--success);
    border-radius: 50%;
    position: relative;
    flex-shrink: 0;
  }
  .pulse::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: var(--success);
    opacity: 0.3;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(2); opacity: 0; }
  }

  /* ── MESSAGES ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  /* Welcome */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 32px 16px 16px;
    animation: fadeUp 0.6s ease forwards;
    gap: 16px;
  }

  .welcome-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #1e3a6e, #2d5ca8);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 40px rgba(79,142,255,0.25);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .welcome h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #f0f4ff, #a8c0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .welcome p {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.7;
    max-width: 320px;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 4px;
  }
  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 12.5px;
    font-family: 'Onest', sans-serif;
    padding: 8px 14px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .chip:hover {
    background: var(--glow);
    border-color: rgba(79,142,255,0.4);
    color: var(--accent);
    transform: translateY(-1px);
  }
  .chip:active { transform: scale(0.97); }

  /* Message row */
  .msg-row {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg-row.user .avatar {
    background: linear-gradient(135deg, #1e3a5f, #1a2a4a);
    border: 1px solid rgba(79,142,255,0.2);
  }
  .msg-row.bot .avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: calc(100% - 52px);
    padding: 13px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.7;
    word-break: break-word;
  }
  .msg-row.user .bubble {
    background: var(--user-bg);
    border: 1px solid rgba(79,142,255,0.15);
    border-top-right-radius: 5px;
    color: var(--text);
  }
  .msg-row.bot .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 5px;
    color: var(--text);
  }

  .bubble p { margin-bottom: 6px; }
  .bubble p:last-child { margin-bottom: 0; }

  /* Typing */
  .typing-dots {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 6px 4px;
  }
  .typing-dots span {
    width: 7px; height: 7px;
    background: var(--text3);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── FOOTER ── */
  footer {
    flex-shrink: 0;
    padding: 12px 16px 20px;
    background: rgba(13,17,23,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
  }

  .input-box {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 10px 10px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-box:focus-within {
    border-color: rgba(79,142,255,0.4);
    box-shadow: 0 0 0 3px rgba(79,142,255,0.06);
  }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14.5px;
    font-family: 'Onest', sans-serif;
    resize: none;
    min-height: 22px;
    max-height: 130px;
    line-height: 1.5;
  }
  textarea::placeholder { color: var(--text3); }

  .send-btn {
    width: 38px; height: 38px;
    flex-shrink: 0;
    background: linear-gradient(135deg, #2563eb, #4f8eff);
    border: none;
    border-radius: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(79,142,255,0.3);
  }
  .send-btn:hover { transform: scale(1.06); box-shadow: 0 6px 18px rgba(79,142,255,0.4); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled {
    background: var(--surface3);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }
  .send-btn svg { width: 17px; height: 17px; fill: white; }

  .hint {
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    margin-top: 8px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Mobile */
  @media (max-width: 480px) {
    header { padding: 12px 14px; }
    #messages { padding: 16px 12px; gap: 16px; }
    .bubble { font-size: 13.5px; padding: 11px 14px; }
    .welcome h2 { font-size: 19px; }
    footer { padding: 10px 12px 18px; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <div class="logo">🏛️</div>
    </div>
    <div class="header-text">
      <h1>Samruk-Kazyna Trust</h1>
      <p><span class="pulse"></span> Ассистент желіде</p>
    </div>
  </header>

  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤝</div>
      <h2>Сәлем! Мен SKT Ассистентімін</h2>
      <p>Қор қызметтері, өтінім беру тәртібі және жобалар туралы сұрақтарыңызға жауап беремін.</p>
      <div class="chips">
        <button class="chip" onclick="ask(this.textContent)">Қор туралы</button>
        <button class="chip" onclick="ask(this.textContent)">Өтінім беру</button>
        <button class="chip" onclick="ask(this.textContent)">Қажетті құжаттар</button>
        <button class="chip" onclick="ask(this.textContent)">Байланыс</button>
        <button class="chip" onclick="ask(this.textContent)">Аймақтар бойынша жобалар</button>
      </div>
    </div>
  </div>

  <footer>
    <div class="input-box">
      <textarea id="inp" placeholder="Сұрағыңызды жазыңыз..." rows="1"></textarea>
      <button class="send-btn" id="btn" onclick="send()" title="Жіберу">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="hint">Enter — жіберу &nbsp;·&nbsp; Shift+Enter — жаңа жол</p>
  </footer>
</div>

<script>
const msgsEl = document.getElementById('messages');
const inp = document.getElementById('inp');
const btn = document.getElementById('btn');

inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 130) + 'px';
});

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function ask(t) { inp.value = t; send(); }

function addMsg(role, text) {
  const w = document.getElementById('welcome');
  if (w) w.remove();

  const row = document.createElement('div');
  row.className = 'msg-row ' + (role === 'user' ? 'user' : role === 'typing' ? 'bot' : 'bot');

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'user' ? '👤' : '🏛️';

  const bub = document.createElement('div');
  bub.className = 'bubble';

  if (role === 'typing') {
    bub.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  } else {
    // Format text: split by newlines, wrap in <p>
    const formatted = text
      .split(/\n+/)
      .map(line => line.trim())
      .filter(line => line.length > 0)
      .map(line => '<p>' + line.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</p>')
      .join('');
    bub.innerHTML = formatted || '<p>' + text + '</p>';
  }

  row.appendChild(av);
  row.appendChild(bub);
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return row;
}

async function send() {
  const text = inp.value.trim();
  if (!text || btn.disabled) return;

  inp.value = '';
  inp.style.height = 'auto';
  btn.disabled = true;

  addMsg('user', text);
  const typing = addMsg('typing', '');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    typing.remove();
    addMsg('bot', data.error ? '⚠️ ' + data.error : data.reply);
  } catch {
    typing.remove();
    addMsg('bot', '⚠️ Сервермен байланыс үзілді. Қайталаңыз.');
  }

  btn.disabled = false;
  inp.focus();
}
</script>
</body>
</html>
